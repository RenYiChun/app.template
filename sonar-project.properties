# SonarQube / SonarCloud 扫描配置（需 SonarQube 服务）
# 使用方式：mvn clean verify sonar:sonar -Psonar -Dsonar.token=<token> -Dsonar.host.url=<url>
#
# 本地分析（无需服务）：mvn verify -Psonarlint

sonar.projectKey=app.template
sonar.projectName=App Template

sonar.sourceEncoding=UTF-8
sonar.java.source=21

# 排除前端、构建产物、测试类（仅分析主代码）
sonar.exclusions=**/target/**,**/*.min.js,**/node_modules/**,**/template-dataforge-headless/**,**/template-dataforge-sample-frontend/**,**/src/test/**
