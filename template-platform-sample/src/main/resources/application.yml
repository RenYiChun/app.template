server:
  port: 8080

spring:
  application:
    name: entity-platform-sample
  datasource:
    url: jdbc:h2:mem:platform
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  platform:
    enabled: true
    api-prefix: /api
    scan-packages: com.lrenyi.template.platform.sample,com.lrenyi.template.platform.domain
    permission-enabled: false
  template:
    enabled: true
    security:
      enabled: false
    audit:
      enabled: true
